apiVersion: batch/v1
kind: Job
metadata:
  generateName: olmo3-vllm-predict-icd-
  labels:
    kueue.x-k8s.io/queue-name: eidf186ns-user-queue
spec:
  completions: 1
  template:
    metadata:
      name: olmo3-vllm-predict-pod
    spec:
      restartPolicy: Never

      containers:
        - name: olmo3-vllm-predict
          # Kubernetes always runs a container image. This uses a generic PyTorch
          # CUDA image and installs vLLM + runtime requirements when the pod starts.
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime

          env:
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HUGGINGFACE_HUB_TOKEN
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HUGGINGFACE_HUB_TOKEN
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: HF_HOME
              value: /mnt/app/.cache/huggingface
            - name: TRANSFORMERS_CACHE
              value: /mnt/app/.cache/huggingface/transformers
            - name: HF_DATASETS_CACHE
              value: /mnt/app/.cache/huggingface/datasets
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn

          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              cd /mnt/app

              echo "Installing Python requirements at pod startup..."
              python -m pip install --upgrade pip
              python -m pip install \
                vllm \
                "transformers>=4.57.0" \
                pandas \
                pyarrow \
                tqdm \
                safetensors

              echo "Starting Olmo 3 7B Instruct + LoRA vLLM prediction for ICD coding..."

              python predict_vllm_olmo3_icd_test.py \
                --test_file ./icd_data/mimiciv_icd10/test.parquet \
                --adapter_dir ./icd_models/olmo3-7b-instruct-mimiciv-icd10-lora-r8 \
                --output_file ./outputs/test_predictions_vllm.jsonl \
                --text_col text \
                --label_col diagnosis_codes \
                --max_model_len 8192 \
                --max_tokens 256 \
                --batch_size 8

              echo "Prediction finished. Output written to:"
              ls -lh ./outputs/test_predictions_vllm.jsonl

          volumeMounts:
            - mountPath: /mnt/app
              name: volume

          resources:
            requests:
              cpu: 4
              memory: 32Gi
            limits:
              cpu: 8
              memory: 64Gi
              nvidia.com/gpu: 1

      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB

      volumes:
        - name: volume
          persistentVolumeClaim:
            claimName: pytorch-pvc
